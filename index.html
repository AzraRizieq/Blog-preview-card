<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>

  <link rel="stylesheet" href="style.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:opsz,wght@10..72,100..900&family=Figtree:ital,wght@0,300..900;1,300..900&family=Lexend+Deca:wght@100..900&family=Outfit:wght@100..900&family=Quicksand&family=Young+Serif&display=swap" rel="stylesheet">

</head>
<body>
  <div class="card">
    <img src="assets\images\illustration-article.svg" alt="Icon_IMG">

    <p class="kuning"><strong>Learning</strong></p>

    <p>
      Published 21 Dec 2023
    </p>

    <h2>
      HTML & CSS foundations
    </h2>

    <p class="info">
      These languages are the backbone of every website, defining structure, content, and presentation.
    </p>

    <div class="avatar">
      <img src="assets\images\image-avatar.webp" alt="image-avatar">
      <p><strong>Greg Hooper</strong></p>
    </div>
  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>

</html>
